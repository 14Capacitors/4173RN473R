---
layout: default
---

<div class="container" style="margin: 20px auto; max-width: 800px; padding: 0 20px;">
    <h1>S0M37H1NG 1N73R3571NG……</h1>
    <ul>
        {% for post in site.posts %}
        <li style="margin-bottom: 12px;">
            <!-- 关键：这里使用了 post.url 作为链接 -->
            <a href="{{ site.baseurl }}{{ post.url }}" style="font-size: 1.1em;">
                {{ post.title }}
            </a>
            <span style="color: #b5e853; margin-left: 12px;">
                ({{ post.date | date: "%Y-%m-%d" }})
            </span>
        </li>
        {% endfor %}
    </ul>
</div>

<style>
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <title>我的网站</title>
        <style>
            body {
                /* 路径相对于 index.html：进入 images 文件夹，找到 background.jpg */
                background-image: url('images/background.png') !important;
                
                /* 让背景图正常显示的三件套 */
                background-repeat: no-repeat !important;
                background-size: cover !important;
                background-position: center !important;
            }
        </style>
    </head>
    </html>
</style>
