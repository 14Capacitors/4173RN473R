

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>4173RN473R</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        /* 强制所有页面的主容器和背景 */
        body,
        body > div,
        body > main,
        body > article,
        body > .wrapper,
        body > .container,
        .post-content,
        .page-content {
            background-image: url('/4173RN473R/images/background.png') !important;
            background-repeat: no-repeat !important;
            background-position: 50% 50% !important;
            background-size: cover !important;
            background-attachment: fixed !important;
        }
        
        /* 白色文字强制应用到所有元素 */
        body, body *,
        .post-content, .post-content *,
        .page-content, .page-content * {
            color: white !important;
        }
        
        /* 链接颜色 */
        a, a * {
            color: #dddddd !important;
            text-decoration: none !important;
        }
        a:hover, a:hover * {
            color: #ffffff !important;
            text-decoration: none !important;
        }
        
        /* 半透明遮罩 */
        body::before,
        main::before,
        .wrapper::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
            pointer-events: none;
        }
        
        /* 内容容器样式 */
        .container, .post-content, .page-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <!-- 这里才是页面的实际内容 -->
    <div class="container" style="margin: 20px auto; max-width: 800px; padding: 0 20px;">
        <h1>S0M37H1NG 1N73R3571NG……</h1>
        <ul>
            {% for post in site.posts %}
            <li style="margin-bottom: 12px;">
                <a href="{{ site.baseurl }}{{ post.url }}" style="font-size: 1.1em;">
                    {{ post.title }}
                </a>
                <span style="color: #b5e853; margin-left: 12px;">
                    ({{ post.date | date: "%Y-%m-%d" }})
                </span>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
