<!DOCTYPE html>
<html>
<head>

<title>Digital Clock</title>
<script>
  function displayTime()
  {
  var elt=document.getElementById("clock");
  var now=new Date();
  elt.innerHTML=now.toLocaleTimeString();
  setTimeout(displayTime,1000);
  }
  window.onload=displayTime;
</script>
<style>
  #clock
  {
  font:bold 72pt sans;
  background:#ddf;
  padding:10px;
  border:solid black 2px;
  border-radius:10px;
  text-align:center;
  }
</style>
</head>
<body>
  <h1>实时时钟显示</h1>
  <span id="clock"></span>
</body>
