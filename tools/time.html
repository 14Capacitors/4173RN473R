<!DOCTYPE html>
<html>
<head>

<title>Digital Clock</title>
<script>
  function displayTime()
  {
  var elt=document.getElementById("clock");
  var now=new Date();
  elt.innerHTML=now.toLocaleTimeString();
  setTimeout(displayTime,1000);
  }
  window.onload=displayTime;
</script>
<style>
  html, body
  {
  margin: 0;
  padding: 0;
  height: 100%;
  background-color: #000000;
  }
  body
  {
  text-align:center;
  backgrond-color:#000000;
  color:#FFFFFF;
  }
  #clock
  {
  font:bold 200pt sans;
  background:#441B72;
  padding:10px;
  border:solid black 2px;
  border-radius:10px;
  text-align:center;
  color:#821E15;
  }
</style>
</head>
<body>
  <h1>实时时钟显示</h1>
  <span id="clock"></span>
</body>
